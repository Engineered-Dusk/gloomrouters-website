<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gloom Routers Cards | Full Rendered Deck Browser</title>
    <meta
      name="description"
      content="Search and filter rendered Aurora, Vesper, and Nova deck cards, generated cards, and pathing cards for Gloom Routers."
    />
    <link rel="stylesheet" href="cards.css" />
  </head>
  <body>
    <header class="cards-hero">
      <a class="home-link" href="/">&larr; Gloom Routers</a>
      <p class="eyebrow">Full rendered cards</p>
      <h1>Gloom Routers Card Browser</h1>
      <p class="lede">Aurora, Vesper, and Nova play decks in one searchable browser, with generated cards and pathing cards kept in separate sections.</p>
      <nav class="jump-links" aria-label="Card browser sections">
        <a href="#browse">Browse</a>
        <a href="#generated-cards">Generated Cards</a>
        <a href="#pathing">Pathing</a>
      </nav>
    </header>

    <main id="card-browser" class="deck-browser" aria-live="polite"></main>

    <aside class="hover-preview" id="hover-preview" aria-hidden="true"></aside>

    <div class="card-modal" id="card-modal" role="dialog" aria-modal="true" aria-label="Expanded card view" hidden>
      <button class="card-modal__close" type="button" aria-label="Close expanded card view">&times;</button>
      <div class="card-modal__content"></div>
    </div>

    <script src="cards.js" defer></script>
  </body>
</html>
