<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gloom Routers Cards | Full Rendered Deck Browser</title>
    <meta
      name="description"
      content="Browse the full rendered Aurora, Vesper, and Nova main decks for Gloom Routers."
    />
    <link rel="stylesheet" href="cards.css" />
  </head>
  <body>
    <header class="cards-hero">
      <a class="home-link" href="/">← Gloom Routers</a>
      <p class="eyebrow">Full rendered cards</p>
      <h1>Gloom Routers Card Browser</h1>
      <p class="lede">Aurora, Vesper, and Nova main decks rendered with finished art, faction frames, icons, rules text, and duplicate deck copies in order.</p>
    </header>

    <main id="card-browser" class="deck-browser" aria-live="polite"></main>

    <aside class="hover-preview" id="hover-preview" aria-hidden="true"></aside>

    <div class="card-modal" id="card-modal" role="dialog" aria-modal="true" aria-label="Expanded card view" hidden>
      <button class="card-modal__close" type="button" aria-label="Close expanded card view">×</button>
      <div class="card-modal__content"></div>
    </div>

    <script src="cards.js" defer></script>
  </body>
</html>
